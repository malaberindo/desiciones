<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Campo Vectorial AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
 embedded
 arjs
 vr-mode-ui="enabled: false"
 renderer="logarithmicDepthBuffer: true;">

  <a-marker preset="hiro" id="marker">

    <a-text
      value="F(x,y)=(-y,x)"
      position="-1 1.5 0"
      color="yellow"
      scale="1 1 1">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>

const marker = document.querySelector('#marker');

// GENERAR MUCHOS VECTORES
for(let x = -3; x <= 3; x += 0.25){

  for(let y = -3; y <= 3; y += 0.25){

    // Campo F(x,y)=(-y,x)
    let vx = -y;
    let vy = x;

    // Magnitud
    let mag = Math.sqrt(vx*vx + vy*vy);

    // Evitar división por cero
    if(mag === 0) continue;

    // Normalizar
    vx /= mag;
    vy /= mag;

    // Ángulo
    let angle = Math.atan2(vy, vx) * 180 / Math.PI;

    // CONTENEDOR DEL VECTOR
    let vector = document.createElement('a-entity');

    vector.setAttribute('position', `${x} ${y} 0`);
    vector.setAttribute('rotation', `0 0 ${angle}`);

    // CUERPO DEL VECTOR
    let body = document.createElement('a-box');

    body.setAttribute('depth', '0.02');
    body.setAttribute('height', '0.03');
    body.setAttribute('width', '0.35');

    body.setAttribute('color', 'blue');

    body.setAttribute('position', '0.15 0 0');

    // PUNTA DEL VECTOR
    let tip = document.createElement('a-cone');

    tip.setAttribute('radius-bottom', '0.06');
    tip.setAttribute('radius-top', '0');

    tip.setAttribute('height', '0.12');

    tip.setAttribute('color', 'red');

    tip.setAttribute('rotation', '0 0 -90');

    tip.setAttribute('position', '0.35 0 0');

    // AGREGAR PARTES
    vector.appendChild(body);
    vector.appendChild(tip);

    // AGREGAR AL MARKER
    marker.appendChild(vector);
  }
}

</script>

</body>
</html>
