<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Campo Vectorial AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
 embedded
 arjs
 vr-mode-ui="enabled: false"
 renderer="logarithmicDepthBuffer: true;">

  <a-marker preset="hiro" id="marker">

    <a-text
      value="F(x,y)=(-y,x)"
      position="-1 1.5 0"
      color="yellow"
      scale="1 1 1">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>

const marker = document.querySelector('#marker');

for(let x = -2; x <= 2; x += 0.5){

  for(let y = -2; y <= 2; y += 0.5){

    let vx = -y;
    let vy = x;

    let mag = Math.sqrt(vx*vx + vy*vy);

    if(mag === 0) continue;

    vx /= mag;
    vy /= mag;

    let angle = Math.atan2(vy, vx) * 180 / Math.PI;

    let arrow = document.createElement('a-box');

    arrow.setAttribute('position', `${x} ${y} 0`);

    arrow.setAttribute('depth', '0.02');
    arrow.setAttribute('height', '0.02');
    arrow.setAttribute('width', '0.4');

    arrow.setAttribute('color', 'blue');

    arrow.setAttribute('rotation', `0 0 ${angle}`);

    marker.appendChild(arrow);
  }
}

</script>

</body>
</html>
