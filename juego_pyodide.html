<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Campo Vectorial AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs>

  <a-marker preset="hiro" id="marker">

    <!-- Texto -->
    <a-text value="F(x,y)=(-y,x)"
            position="-2 2 0"
            color="yellow"
            scale="1 1 1">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>

const marker = document.querySelector('#marker');

// Crear muchos vectores
for(let x = -2; x <= 2; x += 0.5){

  for(let y = -2; y <= 2; y += 0.5){

    // Campo F(x,y)=(-y,x)
    let vx = -y;
    let vy = x;

    // Magnitud
    let mag = Math.sqrt(vx*vx + vy*vy);

    // Evitar división por cero
    if(mag === 0) continue;

    // Normalizar
    vx /= mag;
    vy /= mag;

    // Ángulo
    let angle = Math.atan2(vy, vx) * 180 / Math.PI;

    // Flecha
    let arrow = document.createElement('a-cylinder');

    arrow.setAttribute('position', `${x} ${y} 0`);
    arrow.setAttribute('radius', '0.02');
    arrow.setAttribute('height', '0.4');
    arrow.setAttribute('color', 'blue');

    // Rotación
    arrow.setAttribute('rotation', `0 0 ${-angle + 90}`);

    marker.appendChild(arrow);
  }
}

</script>

</body>
</html>
